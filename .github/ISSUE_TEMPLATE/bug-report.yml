name: "\U0001F41E Bug report"
description: Report an issue that should be fixed
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: e.g., macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: false
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: What runtime are you using? (Node.js or Bun and its version)
      placeholder: e.g., Node v20, Bun v1.4
    validations:
      required: false
  - type: dropdown
    id: version
    attributes:
      label: Package version
      description: What version of ai-brain-tool are you using?
      options:
        [
          'v2.1.0',
          'v2.0.2',
          'v2.0.1',
          'v2.0.0',
          'v1.5.0',
          'v1.4.1',
          'v1.4.0',
          'v1.3.1',
          'v1.3.0',
          'v1.2.0'
        ]
    validations:
      required: false

name: 🐞 Bug report
description: Report an issue that should be fixed
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: e.g., macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: What version of Node.js are you using?
      placeholder: e.g., v20, v22
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Package version
      description: What version of ai-brain-tool are you using?
      placeholder: e.g., 1.3.0
    validations:
      required: false
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [labeled]
    branches: [main]

jobs:
  unit-integration:
    name: Unit + Integration Tests
    if: github.event_name != 'pull_request_target' || github.event.label.name == 'e2e'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit and integration tests with coverage
        run: bun run test:coverage:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report-type: test_results
          file: coverage/junit.xml

  e2e:
    name: End-to-End Tests
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'e2e') ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    needs: unit-integration
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run e2e tests
        run: bun run test:e2e

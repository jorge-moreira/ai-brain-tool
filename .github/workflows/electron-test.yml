name: Electron Test

on:
  push:
    branches: [main, feature/app]
  pull_request:
    branches: [main, feature/app]

jobs:
  build:
    name: Electron Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Electron app (directory mode)
        run: cd packages/electron && bun run vite build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Skip electron-builder on PRs (requires code signing)
      # Just verify Vite build succeeds

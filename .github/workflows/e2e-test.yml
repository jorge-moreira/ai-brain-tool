name: E2E Test

on:
  workflow_call:

jobs:
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create CLI bin wrapper
        run: |
          mkdir -p bin
          echo '#!/usr/bin/env bun' > bin/ai-brain.js
          echo "import '../src/index.ts'" >> bin/ai-brain.js
          chmod +x bin/ai-brain.js

      - name: Run e2e tests
        run: bun run test:e2e:ci
